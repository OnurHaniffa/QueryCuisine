{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6">
        <div class="card shadow-sm" style="border-color: #e8e0d4;">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle text-danger"
                   style="font-size: 3rem;"></i>

                <h3 class="text-maroon mt-3">Delete this restaurant?</h3>

                <p class="text-muted">
                    You're about to permanently delete
                    <strong>{{ restaurant.name }}</strong>.
                    This will also remove its reviews, menu items, and opening hours.
                    This action cannot be undone.
                </p>

                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Yes, delete
                    </button>
                </form>

                <a href="{% url 'restaurant_detail' restaurant.id %}"
                   class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
