{% extends "base.html" %}

{% block content %}

<h1>Restaurants</h1>

<ul>
    {% for restaurant in restaurants %}
        <li>
            <a href="{% url 'restaurant_detail' restaurant.id %}">
                {{ restaurant.name }}
            </a>
        </li>
    {% empty %}
        <li>No restaurants yet</li>
    {% endfor %}
</ul>

{% endblock %}
